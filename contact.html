<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | Sustainable Lifestyle Store</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Global Header / Navbar -->
    <header class="site-header">
      <div class="nav-container">
        <a href="index.html" class="logo">Sustainable Lifestyle Store</a>
        <nav class="nav-links" id="nav-links">
          <a href="index.html" class="nav-link">Home</a>
          <a href="about.html" class="nav-link">About</a>
          <a href="contact.html" class="nav-link active">Contact</a>
          <a href="cart.html" class="nav-link nav-cart-link">
            Cart
            <span class="cart-icon">🛒</span>
            <span class="cart-count-badge" id="cart-count">0</span>
          </a>
        </nav>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <main>
      <section class="contact-hero">
        <div class="content-container fade-in-up">
          <h1>We’d love to hear from you</h1>
          <p>
            Share your feedback, questions, or ideas. Your input helps us curate better products and improve the
            Sustainable Lifestyle Store experience.
          </p>
        </div>
      </section>

      <section class="contact-form-section">
        <div class="content-container">
          <form id="contact-form" class="contact-form fade-in-up" novalidate>
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" placeholder="Your name" required />
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="you@example.com" required />
            </div>

            <div class="form-group">
              <label for="message">Message</label>
              <textarea
                id="message"
                name="message"
                rows="4"
                placeholder="Share your thoughts with us..."
                required
              ></textarea>
            </div>

            <div class="form-group">
              <label for="rating">Overall Experience</label>
              <select id="rating" name="rating" required>
                <option value="">Select a rating</option>
                <option value="excellent">Excellent</option>
                <option value="good">Good</option>
                <option value="average">Average</option>
                <option value="poor">Poor</option>
              </select>
            </div>

            <button type="submit" class="btn-primary full-width">Send Feedback</button>
          </form>
        </div>
      </section>
    </main>

    <!-- Global Footer -->
    <footer class="site-footer">
      <div class="footer-content">
        <p>&copy; <span id="footer-year"></span> Sustainable Lifestyle Store. All rights reserved.</p>
        <div class="footer-social">
          <span class="social-icon">IG</span>
          <span class="social-icon">TW</span>
          <span class="social-icon">IN</span>
        </div>
      </div>
    </footer>

    <script src="js/cart.js"></script>
    <script src="js/script.js"></script>
  </body>
  </html>
